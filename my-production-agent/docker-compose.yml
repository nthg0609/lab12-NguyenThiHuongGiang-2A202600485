version: '3.8'

services:
  agent:
    build: .
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=${REDIS_URL}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE}
      - MONTHLY_BUDGET_USD=${MONTHLY_BUDGET_USD}
    depends_on:
      - redis
    deploy:
      replicas: 3

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - agent